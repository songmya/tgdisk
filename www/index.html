<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TGDrive - Telegram 网盘</title>
<style>
:root {
  --bg: #0f172a; --bg2: #1e293b; --bg3: #334155; --fg: #f1f5f9;
  --fg2: #94a3b8; --accent: #3b82f6; --accent2: #2563eb;
  --green: #22c55e; --red: #ef4444; --yellow: #eab308;
  --radius: 8px; --shadow: 0 4px 24px rgba(0,0,0,.3);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--fg); min-height: 100vh; }
header { background: var(--bg2); border-bottom: 1px solid var(--bg3); padding: 12px 20px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; }
header h1 { font-size: 1.25rem; color: var(--accent); }
header .stats { display:flex; gap:16px; font-size:.85rem; color:var(--fg2); }
header .stats span { color:var(--fg); font-weight:600; }
main { max-width: 1200px; margin: 0 auto; padding: 16px; }
.toolbar { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
.toolbar input, .toolbar select, .toolbar button { padding: 8px 14px; border-radius: var(--radius); border: 1px solid var(--bg3); background: var(--bg2); color: var(--fg); font-size: .9rem; }
.toolbar input { flex:1; min-width:180px; }
.toolbar input:focus { outline:none; border-color: var(--accent); }
.toolbar button { cursor:pointer; background: var(--accent); border-color: var(--accent); font-weight:500; transition:.2s; }
.toolbar button:hover { background: var(--accent2); }
.toolbar button.secondary { background: var(--bg2); border-color: var(--bg3); }
.toolbar button.secondary:hover { background: var(--bg3); }
.breadcrumb { display:flex; gap:4px; margin-bottom:12px; font-size:.85rem; color:var(--fg2); flex-wrap:wrap; align-items:center; }
.breadcrumb a { color:var(--accent); text-decoration:none; cursor:pointer; }
.breadcrumb a:hover { text-decoration:underline; }
.breadcrumb span { color:var(--fg2); }
.file-list { background:var(--bg2); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); }
.file-list table { width:100%; border-collapse:collapse; }
.file-list th { text-align:left; padding:10px 14px; background:var(--bg3); font-size:.8rem; font-weight:600; color:var(--fg2); text-transform:uppercase; letter-spacing:.05em; }
.file-list td { padding:10px 14px; border-bottom:1px solid var(--bg3); font-size:.9rem; }
.file-list tr:hover td { background:rgba(59,130,246,.05); }
.file-list tr:last-child td { border-bottom:none; }
.file-list .name { cursor:pointer; color:var(--fg); font-weight:500; max-width:300px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.file-list .size { color:var(--fg2); white-space:nowrap; }
.file-list .actions { display:flex; gap:6px; }
.file-list .actions button { padding:4px 10px; border-radius:4px; border:1px solid var(--bg3); background:var(--bg2); color:var(--fg); cursor:pointer; font-size:.8rem; transition:.15s; }
.file-list .actions button:hover { border-color: var(--accent); color: var(--accent); }
.file-list .actions button.danger:hover { border-color:var(--red); color:var(--red); }
.pagination { display:flex; justify-content:center; align-items:center; gap:8px; margin-top:16px; }
.pagination button { padding:6px 14px; border-radius:var(--radius); border:1px solid var(--bg3); background:var(--bg2); color:var(--fg); cursor:pointer; font-size:.85rem; }
.pagination button:disabled { opacity:.4; cursor:default; }
.pagination span { color:var(--fg2); font-size:.85rem; }
.empty { text-align:center; padding:40px; color:var(--fg2); }
.empty .icon { font-size:3rem; margin-bottom:8px; }
.upload-zone { border:2px dashed var(--bg3); border-radius:var(--radius); padding:32px; text-align:center; margin-bottom:16px; cursor:pointer; transition:.2s; }
.upload-zone:hover, .upload-zone.dragover { border-color:var(--accent); background:rgba(59,130,246,.05); }
.upload-zone.hidden { display:none; }
.modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200; align-items:center; justify-content:center; }
.modal.show { display:flex; }
.modal-content { background:var(--bg2); border-radius:var(--radius); padding:24px; max-width:500px; width:90%; box-shadow:var(--shadow); }
.modal-content h3 { margin-bottom:12px; }
.modal-content .detail { display:flex; flex-direction:column; gap:8px; }
.modal-content .detail div { display:flex; gap:8px; }
.modal-content .detail .label { color:var(--fg2); min-width:80px; }
.modal-content .actions { display:flex; gap:8px; margin-top:16px; justify-content:flex-end; }
.modal-content button { padding:8px 18px; border-radius:var(--radius); border:1px solid var(--bg3); background:var(--accent); color:var(--fg); cursor:pointer; font-size:.9rem; }
.modal-content button.secondary { background:var(--bg2); }
.toast { position:fixed; bottom:20px; right:20px; padding:10px 18px; border-radius:var(--radius); color:white; font-size:.9rem; z-index:300; animation:slideIn .3s; }
.toast.success { background:var(--green); }
.toast.error { background:var(--red); }
@keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }

.upload-panel { background:var(--bg2); border:1px solid var(--bg3); border-radius:var(--radius); margin-bottom:16px; box-shadow:var(--shadow); overflow:hidden; }
.upload-panel.hidden { display:none; }
.upload-panel-header { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; background:var(--bg3); gap:10px; }
.upload-panel-header h2 { font-size:.95rem; color:var(--fg); }
.upload-panel-header small { color:var(--fg2); }
.upload-list { display:flex; flex-direction:column; }
.upload-item { padding:12px 14px; border-top:1px solid var(--bg3); display:grid; grid-template-columns:1fr auto; gap:10px; align-items:center; }
.upload-item:first-child { border-top:none; }
.upload-name { font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.upload-meta { color:var(--fg2); font-size:.8rem; margin-top:4px; display:flex; gap:10px; flex-wrap:wrap; }
.progress-label { color:var(--fg2); font-size:.75rem; margin-top:8px; }
.progress { height:8px; background:var(--bg); border-radius:999px; overflow:hidden; margin-top:4px; }
.progress-bar { height:100%; width:0%; background:linear-gradient(90deg,var(--accent),var(--green)); transition:width .15s ease; }
.upload-actions { display:flex; gap:6px; }
.upload-actions button { padding:5px 10px; border-radius:4px; border:1px solid var(--bg3); background:var(--bg2); color:var(--fg); cursor:pointer; font-size:.8rem; }
.upload-actions button:hover { border-color:var(--accent); color:var(--accent); }
.upload-actions button.danger:hover { border-color:var(--red); color:var(--red); }
.upload-status-success .progress-bar { background:var(--green); }
.upload-status-error .progress-bar, .upload-status-canceled .progress-bar { background:var(--red); }
.webdav-card { background:var(--bg2); border:1px solid var(--bg3); border-radius:var(--radius); padding:12px 14px; margin-bottom:16px; display:flex; justify-content:space-between; gap:12px; align-items:center; box-shadow:var(--shadow); }
.webdav-card.hidden { display:none; }
.webdav-card .title { font-weight:700; color:var(--accent); margin-bottom:4px; }
.webdav-card .desc { color:var(--fg2); font-size:.85rem; }
.webdav-card code { color:var(--fg); background:var(--bg); padding:2px 6px; border-radius:4px; }
.webdav-card .actions { display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
.webdav-card button { padding:7px 12px; border-radius:var(--radius); border:1px solid var(--bg3); background:var(--bg2); color:var(--fg); cursor:pointer; }
.webdav-card button.primary { background:var(--accent); border-color:var(--accent); }
@media (max-width: 768px) {
  .upload-item { grid-template-columns:1fr; }
  .webdav-card { flex-direction:column; align-items:flex-start; }
  .webdav-card .actions { justify-content:flex-start; }
}

@media (max-width: 768px) {
  header { padding:10px 14px; }
  header h1 { font-size:1rem; }
  header .stats { gap:10px; font-size:.75rem; }
  .file-list th:nth-child(3), .file-list td:nth-child(3),
  .file-list th:nth-child(5), .file-list td:nth-child(5) { display:none; }
  .file-list .name { max-width:140px; }
}
</style>
</head>
<body>
<header>
  <h1>☁️ TGDrive</h1>
  <div class="stats">
    <div>文件 <span id="stat-files">0</span></div>
    <div>大小 <span id="stat-size">0 B</span></div>
  </div>
</header>
<main>
  <div class="toolbar">
    <button onclick="toggleUpload()" title="上传文件">📤 上传</button>
    <button class="secondary" onclick="toggleWebDAV()" title="WebDAV 信息">🌐 WebDAV</button>
    <button class="secondary" onclick="loadTrash()" title="回收站">♻️ 回收站</button>
    <button class="secondary" onclick="newFolder()">📁 新建目录</button>
    <input type="text" id="search-input" placeholder="🔍 搜索文件名或标签..." onkeyup="if(event.key==='Enter')doSearch()">
    <button onclick="doSearch()">搜索</button>
    <button class="secondary" onclick="refresh()">🔄 刷新</button>
  </div>
  <div id="upload-zone" class="upload-zone hidden" ondrop="onDrop(event)" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" onclick="document.getElementById('file-input').click()">
    📂 拖拽文件到此处或点击上传<br><small style="color:var(--fg2)">可指定路径：在上方 toolbar 额外输入 /path 即可</small>
  </div>
  <input type="file" id="file-input" multiple hidden onchange="uploadFiles(this.files)">
  <section id="upload-panel" class="upload-panel hidden">
    <div class="upload-panel-header">
      <div><h2>上传队列</h2><small>支持大文件缓存与后台分片上传；先显示上传到服务器进度，再显示上传到 Telegram 进度。</small></div>
      <button class="secondary" onclick="clearFinishedUploads()">清除已完成</button>
    </div>
    <div id="upload-list" class="upload-list"></div>
  </section>
  <section id="webdav-card" class="webdav-card hidden">
    <div>
      <div class="title">🌐 WebDAV</div>
      <div class="desc">与 WebUI 共用当前端口，挂载路径：<code id="webdav-url">/dav/</code></div>
      <div class="desc">在支持 WebDAV 的客户端中填入这个地址即可访问当前 TGDrive 文件树。</div>
    </div>
    <div class="actions">
      <button class="primary" onclick="openWebDAV()">打开</button>
      <button onclick="copyWebDAVUrl()">复制地址</button>
      <button onclick="refreshWebDAVInfo()">刷新状态</button>
    </div>
  </section>
  <div id="breadcrumb" class="breadcrumb"></div>
  <div class="file-list">
    <table>
      <thead><tr><th>名称</th><th>大小</th><th>类型</th><th>时间</th><th>操作</th></tr></thead>
      <tbody id="file-tbody"><tr><td colspan="5" class="empty">加载中...</td></tr></tbody>
    </table>
  </div>
  <div id="pagination" class="pagination"></div>
</main>
<div id="detail-modal" class="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-content" id="modal-body"></div>
</div>
<script>
const API = '';
let currentPath = '/';
let currentPage = 1;
let currentSearch = '';
let currentView = 'files';

async function loadStats() {
  try {
    const r = await fetch(API+'/api/stats');
    const d = await r.json();
    document.getElementById('stat-files').textContent = d.file_count;
    document.getElementById('stat-size').textContent = formatSize(d.total_size);
  } catch(e) { console.error(e); }
}

async function loadFiles() {
  currentView = 'files';
  const tbody = document.getElementById('file-tbody');
  tbody.innerHTML = '<tr><td colspan="5" class="empty">加载中...</td></tr>';
  const params = new URLSearchParams({ path: currentPath, page: currentPage, limit: 30 });
  if (currentSearch) params.set('search', currentSearch);

  try {
    const [dr, fr] = await Promise.all([
      fetch(API+'/api/dirs?path='+encodeURIComponent(currentPath)),
      fetch(API+'/api/files?'+params.toString()),
    ]);
    const dirs = await dr.json();
    const files = await fr.json();
    renderBreadcrumb(dirs.breadcrumb);
    renderTable(dirs.dirs, files.files);
    renderPagination(files);
  } catch(e) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">❌ 连接失败</td></tr>';
  }
  loadStats();
}

function renderBreadcrumb(crumbs) {
  let html = '';
  crumbs.forEach((c, i) => {
    if (i < crumbs.length - 1) {
      html += `<a onclick="navigate('${c.path}')">${c.name}</a> <span>/</span> `;
    } else {
      html += `<strong>${c.name}</strong>`;
    }
  });
  document.getElementById('breadcrumb').innerHTML = html;
}

function renderTable(dirs, files) {
  const tbody = document.getElementById('file-tbody');
  if (!dirs.length && !files.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty"><div class="icon">📭</div>此目录为空</td></tr>';
    return;
  }
  let rows = '';
  dirs.forEach(d => {
    rows += `<tr>
      <td class="name" onclick="navigate('${d.path}')">📁 ${esc(d.name)}</td>
      <td class="size">-</td><td>目录</td><td>${d.created_at||''}</td>
      <td class="actions"></td>
    </tr>`;
  });
  files.forEach(f => {
    rows += `<tr>
      <td class="name" onclick="showDetail(${f.id})">${fileIcon(f.mime_type,f.file_name)} ${esc(f.file_name)}</td>
      <td class="size">${f.size_fmt}</td><td>${f.file_type||f.mime_type||'file'}</td>
      <td>${f.created_at||''}</td>
      <td class="actions">
        <button onclick="event.stopPropagation();downloadFile(${f.id})">⬇️ 下载</button>
        <button class="danger" onclick="event.stopPropagation();deleteFile(${f.id},'${esc(f.file_name)}')">🗑️</button>
      </td>
    </tr>`;
  });
  tbody.innerHTML = rows;
}

function renderPagination(data) {
  const div = document.getElementById('pagination');
  if (data.pages <= 1) { div.innerHTML = ''; return; }
  div.innerHTML = `
    <button ${data.page<=1?'disabled':''} onclick="goPage(${data.page-1})">‹ 上一页</button>
    <span>${data.page} / ${data.pages}</span>
    <button ${data.page>=data.pages?'disabled':''} onclick="goPage(${data.page+1})">下一页 ›</button>
  `;
}

function navigate(path) { currentPath = path; currentPage = 1; currentSearch = ''; currentView = 'files'; document.getElementById('search-input').value = ''; loadFiles(); }
function doSearch() { currentSearch = document.getElementById('search-input').value.trim(); currentPage = 1; currentView === 'trash' ? loadTrash() : loadFiles(); }
function goPage(p) { currentPage = p; currentView === 'trash' ? loadTrash() : loadFiles(); }
function refresh() { currentView === 'trash' ? loadTrash() : loadFiles(); }

async function showDetail(id) {
  try {
    const r = await fetch(API+'/api/files?search=&page=1&limit=1');
    const d = await r.json();
    const f = d.files.find(x => x.id === id);
    if (!f) return;
    document.getElementById('modal-body').innerHTML = `
      <h3>📄 文件详情</h3>
      <div class="detail">
        <div><span class="label">ID</span><code>${f.id}</code></div>
        <div><span class="label">文件名</span>${esc(f.file_name)}</div>
        <div><span class="label">大小</span>${f.size_fmt}</div>
        <div><span class="label">类型</span>${f.mime_type||f.file_type}</div>
        <div><span class="label">路径</span>${f.path}</div>
        <div><span class="label">标签</span>${f.tags||'-'}</div>
        <div><span class="label">时间</span>${f.created_at}</div>
      </div>
      <div class="actions">
        <button onclick="downloadFile(${f.id})">⬇️ 下载</button>
        <button class="secondary" onclick="closeModal()">关闭</button>
      </div>`;
    document.getElementById('detail-modal').classList.add('show');
  } catch(e) { console.error(e); }
}
function closeModal() { document.getElementById('detail-modal').classList.remove('show'); }

async function downloadFile(id) {
  toast('正在下载（代理中转）...', 'success');
  const a = document.createElement('a');
  a.href = API+'/api/proxy-download/'+id;
  a.download = '';
  a.click();
}

async function deleteFile(id, name) {
  if (!confirm('确定删除索引？\\n\\n'+name+'\\n\\n文件会进入回收站，可在回收站恢复。')) return;
  try {
    const r = await fetch(API+'/api/delete/'+id, { method: 'POST' });
    if (!r.ok) {
      const err = await r.json();
      toast(err.detail || '删除失败', 'error');
      return;
    }
    toast('已移入回收站', 'success');
    loadFiles();
  } catch(e) { toast('出错: '+e, 'error'); }
}

function toggleUpload() {
  document.getElementById('upload-zone').classList.toggle('hidden');
}
function onDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('dragover'); }
function onDragLeave(e) { e.currentTarget.classList.remove('dragover'); }
function onDrop(e) { e.preventDefault(); e.currentTarget.classList.remove('dragover'); uploadFiles(e.dataTransfer.files); }
async function newFolder() {
  const name = prompt('目录名称：');
  if (!name) return;
  try {
    const r = await fetch(API+'/api/mkdir?name='+encodeURIComponent(name)+'&parent='+encodeURIComponent(currentPath), { method: 'POST' });
    if (!r.ok) {
      const err = await r.json();
      toast(err.detail || '创建失败', 'error');
      return;
    }
    toast('目录已创建', 'success');
    loadFiles();
  } catch(e) { toast('出错: '+e, 'error'); }
}
const uploads = new Map();
let uploadSeq = 0;
let activeUploads = 0;
const MAX_PARALLEL_UPLOADS = 2;
const BROWSER_CHUNK_SIZE = 8 * 1024 * 1024;

function uploadFiles(files) {
  if (!files || !files.length) return;
  document.getElementById('upload-panel').classList.remove('hidden');
  Array.from(files).forEach(file => {
    const id = ++uploadSeq;
    uploads.set(id, {
      id, file, path: currentPath, status: 'queued', progress: 0,
      loaded: 0, total: file.size, speed: 0, startedAt: 0,
      sessionId: '', result: null, error: '', abortReason: 'canceled',
      telegramProgress: 0, telegramRead: 0, telegramTotal: 0,
      pollTimer: null, paused: false, canceled: false, currentController: null
    });
  });
  renderUploads();
  startUploadQueue();
  document.getElementById('file-input').value = '';
}

function startUploadQueue() {
  while (activeUploads < MAX_PARALLEL_UPLOADS) {
    const task = Array.from(uploads.values()).find(t => t.status === 'queued');
    if (!task) break;
    startUpload(task);
  }
}

async function startUpload(task) {
  task.status = 'uploading';
  task.paused = false;
  task.canceled = false;
  task.error = '';
  task.startedAt = Date.now();
  task.speed = 0;
  activeUploads++;
  renderUploads();
  try {
    if (!task.sessionId) await initChunkedUpload(task);
    await uploadChunks(task);
    if (task.paused || task.canceled) return;
    await commitUpload(task);
  } catch (e) {
    if (task.paused || task.canceled) return;
    task.status = 'error';
    task.error = e.message || String(e);
    toast(`上传 ${task.file.name} 失败: ${task.error}`, 'error');
  } finally {
    activeUploads = Math.max(0, activeUploads - 1);
    task.currentController = null;
    renderUploads();
    startUploadQueue();
  }
}

async function initChunkedUpload(task) {
  const params = new URLSearchParams({
    file_name: task.file.name,
    file_size: String(task.file.size),
    mime_type: task.file.type || 'application/octet-stream',
    path: task.path,
  });
  const r = await fetch(API+'/api/uploads/init?'+params.toString(), { method: 'POST' });
  if (!r.ok) throw new Error(await responseError(r));
  const d = await r.json();
  task.sessionId = d.id;
  task.loaded = d.received_size || 0;
  task.progress = task.file.size ? task.loaded / task.file.size * 100 : 0;
  task.result = d;
}

async function uploadChunks(task) {
  while (task.loaded < task.file.size) {
    if (task.paused || task.canceled) return;
    const start = task.loaded;
    const end = Math.min(start + BROWSER_CHUNK_SIZE, task.file.size);
    const blob = task.file.slice(start, end);
    const controller = new AbortController();
    task.currentController = controller;
    const before = Date.now();
    const r = await fetch(API+'/api/uploads/'+task.sessionId+'/chunk?offset='+start, {
      method: 'POST',
      body: blob,
      headers: { 'Content-Type': 'application/octet-stream' },
      signal: controller.signal,
    });
    task.currentController = null;
    if (!r.ok) {
      let detail = await responseError(r);
      // If server tells us the expected offset, trust it and continue from there.
      try {
        const obj = JSON.parse(detail);
        const expected = obj.expected_offset ?? obj.detail?.expected_offset;
        if (typeof expected === 'number') {
          task.loaded = expected;
          task.progress = task.file.size ? task.loaded / task.file.size * 100 : 0;
          renderUploads();
          continue;
        }
      } catch (_) {}
      throw new Error(detail);
    }
    const d = await r.json();
    task.loaded = d.received_size || end;
    task.progress = task.file.size ? Math.max(0, Math.min(100, task.loaded / task.file.size * 100)) : 0;
    const elapsed = Math.max(0.001, (Date.now() - before) / 1000);
    task.speed = blob.size / elapsed;
    task.result = d;
    renderUploads();
  }
}

async function commitUpload(task) {
  const r = await fetch(API+'/api/uploads/'+task.sessionId+'/commit', { method: 'POST' });
  if (!r.ok) throw new Error(await responseError(r));
  const d = await r.json();
  task.result = d;
  task.status = 'telegram';
  task.progress = 100;
  task.telegramProgress = d.telegram_progress || 0;
  toast(`${task.file.name} 已缓存，开始后台上传 Telegram`, 'success');
  pollUploadSession(task);
}

function pauseUpload(id) {
  const task = uploads.get(id);
  if (!task) return;
  if (task.status === 'telegram') {
    toast('后台 Telegram 上传已开始，暂不支持暂停；可取消任务或等待完成', 'error');
    return;
  }
  task.paused = true;
  if (task.currentController) task.currentController.abort();
  task.status = 'paused';
  task.error = '已暂停，可从当前进度继续';
  if (task.sessionId) fetch(API+'/api/uploads/'+task.sessionId+'/pause', { method: 'POST' }).catch(()=>{});
  renderUploads();
  startUploadQueue();
}

function resumeUpload(id) {
  const task = uploads.get(id);
  if (!task || !['paused','error'].includes(task.status)) return;
  task.status = 'queued';
  task.paused = false;
  task.canceled = false;
  task.error = '';
  renderUploads();
  startUploadQueue();
}

async function cancelUpload(id) {
  const task = uploads.get(id);
  if (!task) return;
  task.canceled = true;
  if (task.pollTimer) {
    clearTimeout(task.pollTimer);
    task.pollTimer = null;
  }
  if (task.currentController) task.currentController.abort();
  if (task.sessionId) {
    try { await fetch(API+'/api/uploads/'+task.sessionId+'/cancel', { method: 'POST' }); } catch (_) {}
  }
  task.status = 'canceled';
  task.error = task.status === 'telegram' ? '已取消后台任务（已开始的 Telegram 分片可能仍会完成当前片）' : '已取消';
  renderUploads();
  startUploadQueue();
}

function removeUpload(id) {
  const task = uploads.get(id);
  if (!task) return;
  if (task.status === 'uploading' || task.status === 'telegram') cancelUpload(id);
  uploads.delete(id);
  renderUploads();
}

function clearFinishedUploads() {
  for (const [id, task] of uploads) {
    if (['success','error','canceled','paused'].includes(task.status) && !task.currentController) uploads.delete(id);
  }
  renderUploads();
}

function renderUploads() {
  const panel = document.getElementById('upload-panel');
  const list = document.getElementById('upload-list');
  if (!uploads.size) {
    list.innerHTML = '<div class="empty">暂无上传任务</div>';
    return;
  }
  panel.classList.remove('hidden');
  list.innerHTML = Array.from(uploads.values()).map(task => {
    const pct = task.progress || 0;
    const statusText = uploadStatusText(task);
    const resultText = task.result ? ` · ${task.result.mode || ''}${task.result.chunk_count ? ` · ${task.result.chunk_count} 片` : ''}${task.result.file_id ? ` · 文件ID ${task.result.file_id}` : ''}${task.sessionId ? ` · 任务 ${task.sessionId.slice(0,8)}` : ''}` : '';
    const canPause = task.status === 'uploading' || task.status === 'queued' || task.status === 'telegram';
    const canResume = ['paused','error'].includes(task.status) && task.sessionId;
    const canCancel = ['uploading','queued','paused','telegram','error'].includes(task.status);
    return `<div class="upload-item upload-status-${task.status}">
      <div>
        <div class="upload-name">${esc(task.file.name)}</div>
        <div class="upload-meta">
          <span>${formatSize(task.file.size)}</span>
          <span>${statusText}${resultText}</span>
          <span>${pct.toFixed(1)}%</span>
          ${task.speed && task.status === 'uploading' ? `<span>${formatSize(task.speed)}/s</span>` : ''}
          ${task.error ? `<span style="color:var(--red)">${esc(task.error)}</span>` : ''}
        </div>
        <div class="progress-label">上传到服务器</div>
        <div class="progress"><div class="progress-bar" style="width:${pct}%"></div></div>
        ${task.sessionId ? `<div class="progress-label">上传到 Telegram ${task.telegramProgress ? task.telegramProgress.toFixed(1) : '0.0'}%</div><div class="progress"><div class="progress-bar" style="width:${task.telegramProgress || 0}%"></div></div>` : ''}
      </div>
      <div class="upload-actions">
        ${canPause ? `<button onclick="pauseUpload(${task.id})">暂停</button>` : ''}
        ${canResume ? `<button onclick="resumeUpload(${task.id})">继续</button>` : ''}
        ${canCancel ? `<button class="danger" onclick="cancelUpload(${task.id})">取消</button>` : ''}
        ${!task.currentController ? `<button onclick="removeUpload(${task.id})">移除</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

async function pollUploadSession(task) {
  if (!task.sessionId) return;
  if (task.pollTimer) clearTimeout(task.pollTimer);
  try {
    const r = await fetch(API+'/api/uploads/'+task.sessionId);
    if (!r.ok) throw new Error('状态接口返回 '+r.status);
    const d = await r.json();
    task.result = d.result || task.result || d;
    task.telegramProgress = d.telegram_progress || 0;
    task.telegramRead = d.telegram_read_bytes || 0;
    task.telegramTotal = d.telegram_total_bytes || d.total_size || 0;
    if (d.status === 'done') {
      task.status = 'success';
      task.telegramProgress = 100;
      task.result = d.result || task.result;
      toast(`${task.file.name} Telegram 上传完成`, 'success');
      loadFiles();
      renderUploads();
      return;
    }
    if (d.status === 'failed' || d.status === 'canceled') {
      task.status = d.status === 'failed' ? 'error' : 'canceled';
      task.error = d.error || task.status;
      renderUploads();
      return;
    }
    task.status = 'telegram';
    renderUploads();
    task.pollTimer = setTimeout(() => pollUploadSession(task), 1500);
  } catch(e) {
    task.error = '状态刷新失败: '+e.message;
    renderUploads();
    task.pollTimer = setTimeout(() => pollUploadSession(task), 3000);
  }
}

function uploadStatusText(task) {
  return {
    queued: '等待中', uploading: '上传到服务器', telegram: '上传到 Telegram', success: '已完成',
    error: '失败', canceled: '已取消', paused: '已暂停'
  }[task.status] || task.status;
}

async function responseError(r) {
  const text = await r.text();
  try {
    const obj = JSON.parse(text);
    return typeof obj.detail === 'string' ? obj.detail : JSON.stringify(obj.detail || obj);
  } catch (_) {
    return text || r.statusText || `HTTP ${r.status}`;
  }
}


function webdavAbsoluteUrl() {
  return window.location.origin + '/dav/';
}
function toggleWebDAV() {
  const card = document.getElementById('webdav-card');
  card.classList.toggle('hidden');
  refreshWebDAVInfo();
}
async function refreshWebDAVInfo() {
  const el = document.getElementById('webdav-url');
  if (el) el.textContent = webdavAbsoluteUrl();
  try {
    const r = await fetch(API+'/api/webdav');
    if (!r.ok) throw new Error('WebDAV 状态接口不可用');
  } catch(e) {
    toast('WebDAV 状态检查失败: '+e.message, 'error');
  }
}
function openWebDAV() { window.open(webdavAbsoluteUrl(), '_blank'); }
async function copyWebDAVUrl() {
  const url = webdavAbsoluteUrl();
  try {
    await navigator.clipboard.writeText(url);
    toast('WebDAV 地址已复制', 'success');
  } catch(e) {
    prompt('复制 WebDAV 地址：', url);
  }
}


function fileIcon(mime, name) {
  if (mime) {
    if (mime.startsWith('image/')) return '🖼️';
    if (mime.startsWith('video/')) return '🎬';
    if (mime.startsWith('audio/')) return '🎵';
    if (mime.includes('pdf')) return '📄';
    if (mime.includes('zip')||mime.includes('rar')||mime.includes('tar')||mime.includes('gz')) return '📦';
  }
  const ext = (name||'').split('.').pop()?.toLowerCase();
  if (ext === 'pdf') return '📄';
  if (ext === 'zip' || ext === 'rar' || ext === '7z') return '📦';
  if (ext === 'mp4' || ext === 'mkv') return '🎬';
  if (ext === 'mp3' || ext === 'flac') return '🎵';
  if (ext === 'jpg' || ext === 'png' || ext === 'jpeg') return '🖼️';
  return '📎';
}
function formatSize(s) {
  for (const u of ['B','KB','MB','GB','TB']) { if (s < 1024) return s.toFixed(1)+' '+u; s /= 1024; }
  return s.toFixed(1)+' TB';
}
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast '+type; t.textContent=msg; document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}
loadFiles();
</script>
