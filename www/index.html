<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TGDrive - Telegram 网盘</title>
<style>
:root {
  --bg: #0f172a; --bg2: #1e293b; --bg3: #334155; --fg: #f1f5f9;
  --fg2: #94a3b8; --accent: #3b82f6; --accent2: #2563eb;
  --green: #22c55e; --red: #ef4444; --yellow: #eab308;
  --radius: 8px; --shadow: 0 4px 24px rgba(0,0,0,.3);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--fg); min-height: 100vh; }
header { background: var(--bg2); border-bottom: 1px solid var(--bg3); padding: 12px 20px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; }
header h1 { font-size: 1.25rem; color: var(--accent); }
header .stats { display:flex; gap:16px; font-size:.85rem; color:var(--fg2); }
header .stats span { color:var(--fg); font-weight:600; }
main { max-width: 1200px; margin: 0 auto; padding: 16px; }
.toolbar { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
.toolbar input, .toolbar select, .toolbar button { padding: 8px 14px; border-radius: var(--radius); border: 1px solid var(--bg3); background: var(--bg2); color: var(--fg); font-size: .9rem; }
.toolbar input { flex:1; min-width:180px; }
.toolbar input:focus { outline:none; border-color: var(--accent); }
.toolbar button { cursor:pointer; background: var(--accent); border-color: var(--accent); font-weight:500; transition:.2s; }
.toolbar button:hover { background: var(--accent2); }
.toolbar button.secondary { background: var(--bg2); border-color: var(--bg3); }
.toolbar button.secondary:hover { background: var(--bg3); }
.breadcrumb { display:flex; gap:4px; margin-bottom:12px; font-size:.85rem; color:var(--fg2); flex-wrap:wrap; align-items:center; }
.breadcrumb a { color:var(--accent); text-decoration:none; cursor:pointer; }
.breadcrumb a:hover { text-decoration:underline; }
.breadcrumb span { color:var(--fg2); }
.file-list { background:var(--bg2); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); }
.file-list table { width:100%; border-collapse:collapse; }
.file-list th { text-align:left; padding:10px 14px; background:var(--bg3); font-size:.8rem; font-weight:600; color:var(--fg2); text-transform:uppercase; letter-spacing:.05em; }
.file-list td { padding:10px 14px; border-bottom:1px solid var(--bg3); font-size:.9rem; }
.file-list tr:hover td { background:rgba(59,130,246,.05); }
.file-list tr:last-child td { border-bottom:none; }
.file-list .name { cursor:pointer; color:var(--fg); font-weight:500; max-width:300px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.file-list .size { color:var(--fg2); white-space:nowrap; }
.file-list .actions { display:flex; gap:6px; }
.file-list .actions button { padding:4px 10px; border-radius:4px; border:1px solid var(--bg3); background:var(--bg2); color:var(--fg); cursor:pointer; font-size:.8rem; transition:.15s; }
.file-list .actions button:hover { border-color: var(--accent); color: var(--accent); }
.file-list .actions button.danger:hover { border-color:var(--red); color:var(--red); }
.pagination { display:flex; justify-content:center; align-items:center; gap:8px; margin-top:16px; }
.pagination button { padding:6px 14px; border-radius:var(--radius); border:1px solid var(--bg3); background:var(--bg2); color:var(--fg); cursor:pointer; font-size:.85rem; }
.pagination button:disabled { opacity:.4; cursor:default; }
.pagination span { color:var(--fg2); font-size:.85rem; }
.empty { text-align:center; padding:40px; color:var(--fg2); }
.empty .icon { font-size:3rem; margin-bottom:8px; }
.upload-zone { border:2px dashed var(--bg3); border-radius:var(--radius); padding:32px; text-align:center; margin-bottom:16px; cursor:pointer; transition:.2s; }
.upload-zone:hover, .upload-zone.dragover { border-color:var(--accent); background:rgba(59,130,246,.05); }
.upload-zone.hidden { display:none; }
.modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200; align-items:center; justify-content:center; }
.modal.show { display:flex; }
.modal-content { background:var(--bg2); border-radius:var(--radius); padding:24px; max-width:500px; width:90%; box-shadow:var(--shadow); }
.modal-content h3 { margin-bottom:12px; }
.modal-content .detail { display:flex; flex-direction:column; gap:8px; }
.modal-content .detail div { display:flex; gap:8px; }
.modal-content .detail .label { color:var(--fg2); min-width:80px; }
.modal-content .actions { display:flex; gap:8px; margin-top:16px; justify-content:flex-end; }
.modal-content button { padding:8px 18px; border-radius:var(--radius); border:1px solid var(--bg3); background:var(--accent); color:var(--fg); cursor:pointer; font-size:.9rem; }
.modal-content button.secondary { background:var(--bg2); }
.toast { position:fixed; bottom:20px; right:20px; padding:10px 18px; border-radius:var(--radius); color:white; font-size:.9rem; z-index:300; animation:slideIn .3s; }
.toast.success { background:var(--green); }
.toast.error { background:var(--red); }
@keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }
@media (max-width: 768px) {
  header { padding:10px 14px; }
  header h1 { font-size:1rem; }
  header .stats { gap:10px; font-size:.75rem; }
  .file-list th:nth-child(3), .file-list td:nth-child(3),
  .file-list th:nth-child(5), .file-list td:nth-child(5) { display:none; }
  .file-list .name { max-width:140px; }
}
</style>
</head>
<body>
<header>
  <h1>☁️ TGDrive</h1>
  <div class="stats">
    <div>文件 <span id="stat-files">0</span></div>
    <div>大小 <span id="stat-size">0 B</span></div>
  </div>
</header>
<main>
  <div class="toolbar">
    <button onclick="toggleUpload()" title="上传文件">📤 上传</button>
    <button class="secondary" onclick="newFolder()">📁 新建目录</button>
    <input type="text" id="search-input" placeholder="🔍 搜索文件名或标签..." onkeyup="if(event.key==='Enter')doSearch()">
    <button onclick="doSearch()">搜索</button>
    <button class="secondary" onclick="refresh()">🔄 刷新</button>
  </div>
  <div id="upload-zone" class="upload-zone hidden" ondrop="onDrop(event)" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" onclick="document.getElementById('file-input').click()">
    📂 拖拽文件到此处或点击上传<br><small style="color:var(--fg2)">可指定路径：在上方 toolbar 额外输入 /path 即可</small>
  </div>
  <input type="file" id="file-input" multiple hidden onchange="uploadFiles(this.files)">
  <div id="breadcrumb" class="breadcrumb"></div>
  <div class="file-list">
    <table>
      <thead><tr><th>名称</th><th>大小</th><th>类型</th><th>时间</th><th>操作</th></tr></thead>
      <tbody id="file-tbody"><tr><td colspan="5" class="empty">加载中...</td></tr></tbody>
    </table>
  </div>
  <div id="pagination" class="pagination"></div>
</main>
<div id="detail-modal" class="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-content" id="modal-body"></div>
</div>
<script>
const API = '';
let currentPath = '/';
let currentPage = 1;
let currentSearch = '';

async function loadStats() {
  try {
    const r = await fetch(API+'/api/stats');
    const d = await r.json();
    document.getElementById('stat-files').textContent = d.file_count;
    document.getElementById('stat-size').textContent = formatSize(d.total_size);
  } catch(e) { console.error(e); }
}

async function loadFiles() {
  const tbody = document.getElementById('file-tbody');
  tbody.innerHTML = '<tr><td colspan="5" class="empty">加载中...</td></tr>';
  const params = new URLSearchParams({ path: currentPath, page: currentPage, limit: 30 });
  if (currentSearch) params.set('search', currentSearch);

  try {
    const [dr, fr] = await Promise.all([
      fetch(API+'/api/dirs?path='+encodeURIComponent(currentPath)),
      fetch(API+'/api/files?'+params.toString()),
    ]);
    const dirs = await dr.json();
    const files = await fr.json();
    renderBreadcrumb(dirs.breadcrumb);
    renderTable(dirs.dirs, files.files);
    renderPagination(files);
  } catch(e) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">❌ 连接失败</td></tr>';
  }
  loadStats();
}

function renderBreadcrumb(crumbs) {
  let html = '';
  crumbs.forEach((c, i) => {
    if (i < crumbs.length - 1) {
      html += `<a onclick="navigate('${c.path}')">${c.name}</a> <span>/</span> `;
    } else {
      html += `<strong>${c.name}</strong>`;
    }
  });
  document.getElementById('breadcrumb').innerHTML = html;
}

function renderTable(dirs, files) {
  const tbody = document.getElementById('file-tbody');
  if (!dirs.length && !files.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty"><div class="icon">📭</div>此目录为空</td></tr>';
    return;
  }
  let rows = '';
  dirs.forEach(d => {
    rows += `<tr>
      <td class="name" onclick="navigate('${d.path}')">📁 ${d.name}/</td>
      <td class="size">-</td><td>目录</td><td>${d.created_at||''}</td>
      <td class="actions"></td>
    </tr>`;
  });
  files.forEach(f => {
    rows += `<tr>
      <td class="name" onclick="showDetail(${f.id})">${fileIcon(f.mime_type,f.file_name)} ${esc(f.file_name)}</td>
      <td class="size">${f.size_fmt}</td><td>${f.file_type||f.mime_type||'file'}</td>
      <td>${f.created_at||''}</td>
      <td class="actions">
        <button onclick="event.stopPropagation();downloadFile(${f.id})">⬇️ 下载</button>
        <button class="danger" onclick="event.stopPropagation();deleteFile(${f.id},'${esc(f.file_name)}')">🗑️</button>
      </td>
    </tr>`;
  });
  tbody.innerHTML = rows;
}

function renderPagination(data) {
  const div = document.getElementById('pagination');
  if (data.pages <= 1) { div.innerHTML = ''; return; }
  div.innerHTML = `
    <button ${data.page<=1?'disabled':''} onclick="goPage(${data.page-1})">‹ 上一页</button>
    <span>${data.page} / ${data.pages}</span>
    <button ${data.page>=data.pages?'disabled':''} onclick="goPage(${data.page+1})">下一页 ›</button>
  `;
}

function navigate(path) { currentPath = path; currentPage = 1; currentSearch = ''; document.getElementById('search-input').value = ''; loadFiles(); }
function doSearch() { currentSearch = document.getElementById('search-input').value.trim(); currentPage = 1; loadFiles(); }
function goPage(p) { currentPage = p; loadFiles(); }
function refresh() { loadFiles(); }

async function showDetail(id) {
  try {
    const r = await fetch(API+'/api/files?search=&page=1&limit=1');
    const d = await r.json();
    const f = d.files.find(x => x.id === id);
    if (!f) return;
    document.getElementById('modal-body').innerHTML = `
      <h3>📄 文件详情</h3>
      <div class="detail">
        <div><span class="label">ID</span><code>${f.id}</code></div>
        <div><span class="label">文件名</span>${esc(f.file_name)}</div>
        <div><span class="label">大小</span>${f.size_fmt}</div>
        <div><span class="label">类型</span>${f.mime_type||f.file_type}</div>
        <div><span class="label">路径</span>${f.path}</div>
        <div><span class="label">标签</span>${f.tags||'-'}</div>
        <div><span class="label">时间</span>${f.created_at}</div>
      </div>
      <div class="actions">
        <button onclick="downloadFile(${f.id})">⬇️ 下载</button>
        <button class="secondary" onclick="closeModal()">关闭</button>
      </div>`;
    document.getElementById('detail-modal').classList.add('show');
  } catch(e) { console.error(e); }
}
function closeModal() { document.getElementById('detail-modal').classList.remove('show'); }

async function downloadFile(id) {
  toast('正在下载（代理中转）...', 'success');
  const a = document.createElement('a');
  a.href = API+'/api/proxy-download/'+id;
  a.download = '';
  a.click();
}

async function deleteFile(id, name) {
  if (!confirm('确定删除索引？\\n\\n'+name+'\\n\\n注意：文件可能仍存在 Telegram 服务器')) return;
  try {
    const r = await fetch(API+'/api/delete/'+id, { method: 'POST' });
    if (!r.ok) {
      const err = await r.json();
      toast(err.detail || '删除失败', 'error');
      return;
    }
    toast('已删除', 'success');
    loadFiles();
  } catch(e) { toast('出错: '+e, 'error'); }
}

function toggleUpload() {
  document.getElementById('upload-zone').classList.toggle('hidden');
}
function onDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('dragover'); }
function onDragLeave(e) { e.currentTarget.classList.remove('dragover'); }
function onDrop(e) { e.preventDefault(); e.currentTarget.classList.remove('dragover'); uploadFiles(e.dataTransfer.files); }
async function newFolder() {
  const name = prompt('目录名称：');
  if (!name) return;
  try {
    const r = await fetch(API+'/api/mkdir?name='+encodeURIComponent(name)+'&parent='+encodeURIComponent(currentPath), { method: 'POST' });
    if (!r.ok) {
      const err = await r.json();
      toast(err.detail || '创建失败', 'error');
      return;
    }
    toast('目录已创建', 'success');
    loadFiles();
  } catch(e) { toast('出错: '+e, 'error'); }
}
async function uploadFiles(files) {
  if (!files || !files.length) return;
  
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    if (file.size > 50 * 1024 * 1024) {
      toast(`${file.name} 超过50MB，需使用 Telegram 客户端发给 Bot 上传`, 'error');
      continue;
    }
    
    toast(`正在上传 ${file.name}...`, 'success');
    const formData = new FormData();
    formData.append('file', file);
    
    try {
      const r = await fetch(API+'/api/upload?path='+encodeURIComponent(currentPath), {
        method: 'POST',
        body: formData
      });
      if (!r.ok) {
        const err = await r.json();
        toast(`上传 ${file.name} 失败: ${err.detail}`, 'error');
      } else {
        toast(`${file.name} 上传成功!`, 'success');
      }
    } catch(e) {
      toast(`上传 ${file.name} 出错: ${e}`, 'error');
    }
  }
  
  loadFiles();
  document.getElementById('upload-zone').classList.add('hidden');
}

function fileIcon(mime, name) {
  if (mime) {
    if (mime.startsWith('image/')) return '🖼️';
    if (mime.startsWith('video/')) return '🎬';
    if (mime.startsWith('audio/')) return '🎵';
    if (mime.includes('pdf')) return '📄';
    if (mime.includes('zip')||mime.includes('rar')||mime.includes('tar')||mime.includes('gz')) return '📦';
  }
  const ext = (name||'').split('.').pop()?.toLowerCase();
  if (ext === 'pdf') return '📄';
  if (ext === 'zip' || ext === 'rar' || ext === '7z') return '📦';
  if (ext === 'mp4' || ext === 'mkv') return '🎬';
  if (ext === 'mp3' || ext === 'flac') return '🎵';
  if (ext === 'jpg' || ext === 'png' || ext === 'jpeg') return '🖼️';
  return '📎';
}
function formatSize(s) {
  for (const u of ['B','KB','MB','GB','TB']) { if (s < 1024) return s.toFixed(1)+' '+u; s /= 1024; }
  return s.toFixed(1)+' TB';
}
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast '+type; t.textContent=msg; document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}
loadFiles();
</script>
</body>
</html>
