[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:bot]
command=python bot.py
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:webui]
command=python webui.py 8080
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; WebDAV 已挂载到 WebUI 同端口的 /dav，默认不再单独启动 8081。
; 如需兼容旧客户端，可取消下面配置的注释并额外暴露 8081。
;[program:webdav]
;command=python webdav.py
;directory=/app
;autostart=true
;autorestart=true
;stdout_logfile=/dev/stdout
;stdout_logfile_maxbytes=0
;stderr_logfile=/dev/stderr
;stderr_logfile_maxbytes=0
