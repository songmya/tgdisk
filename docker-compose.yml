version: "3.8"

services:
  tgdisk:
    build: .
    image: tgdisk:latest
    container_name: tgdisk
    restart: unless-stopped
    env_file: .env
    depends_on:
      - botapi

    ports:
      # WebUI（FastAPI）+ WebDAV（/dav）共用同一个端口
      - "6354:8080"

    environment:
      # 使用同 compose 内的自建 Bot API。
      # 如果 .env 里已有同名项，这里会覆盖为容器内服务名，避免容器访问宿主 127.0.0.1。
      LOCAL_API_BASE: "http://botapi:8081"
      LOCAL_API_MODE: "true"

      # Bot API local mode 下载路径映射：
      # getFile 返回 botapi 容器内的 /var/lib/telegram-bot-api/...
      # tgdisk 也把同一个 volume 挂到同一路径，所以两个值保持一致即可。
      BOT_API_SERVER_DIR: "/var/lib/telegram-bot-api"
      BOT_API_LOCAL_DIR: "/var/lib/telegram-bot-api"

      # 启用 LOCAL_API_MODE 后，本地缓存文件走低内存文件流上传，
      # 不需要把分片阈值调很大。
      TG_UPLOAD_CHUNK_SIZE_MB: "1500"
      TG_SINGLE_UPLOAD_THRESHOLD_MB: "1500"
      TG_LOCAL_SINGLE_UPLOAD_LIMIT_MB: "1500"
      TG_LOCAL_PART_SIZE_MB: "1500"
      UPLOAD_CONCURRENCY: "1"

      UPLOAD_CACHE_ENABLED: "true"
      UPLOAD_CACHE_DIR: "data/cache"
      UPLOAD_CACHE_KEEP_AFTER_DONE: "false"

      # 允许 /api/resume-upload 从 WebUI 缓存、系统临时目录、Bot API local 共享目录读取源文件。
      RESUME_ALLOWED_DIRS: "/app/data/cache,/tmp,/var/lib/telegram-bot-api"

    volumes:
      # tgdisk 数据库、WebUI 上传缓存等
      - ./data:/app/data
      # 关键：共享 botapi 的 local 文件目录给 tgdisk 读取，用于 local mode 下载
      - ./data/botapi:/var/lib/telegram-bot-api:ro

    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/api/stats || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  botapi:
    image: aiogram/telegram-bot-api:latest
    container_name: tgdisk-botapi
    restart: unless-stopped
    env_file: .env

    environment:
      # 在 .env 中填写：
      # TELEGRAM_API_ID=123456
      # TELEGRAM_API_HASH=xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      TELEGRAM_API_ID: "${TELEGRAM_API_ID}"
      TELEGRAM_API_HASH: "${TELEGRAM_API_HASH}"
      TELEGRAM_LOCAL: "1"

    command:
      - --http-port=8081
      - --dir=/var/lib/telegram-bot-api
      - --local

    volumes:
      # 关键：botapi local mode 的文件缓存/目录。tgdisk 以只读方式挂载同一个目录。
      - ./data/botapi:/var/lib/telegram-bot-api

    ports:
      # 可选：宿主机访问自建 Bot API。tgdisk 容器内部使用 http://botapi:8081。
      - "6553:8081"

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
