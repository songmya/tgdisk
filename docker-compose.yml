services:
  tgdisk:
    image: songmy94/tgdrive:latest
    container_name: tgdisk
    restart: unless-stopped
    env_file: .env
    depends_on:
      - botapi

    ports:
      # WebUI（FastAPI）+ WebDAV（/dav）共用同一个端口
      - "6354:8080"

    volumes:
      # tgdisk 数据库、WebUI 上传缓存等
      - ./data:/app/data
      # 关键：共享 botapi 的 local 文件目录给 tgdisk 读取，用于 local mode 下载
      - ./data/botapi:/var/lib/telegram-bot-api:ro

    healthcheck:
      test: ["CMD-SHELL", "wget -q --header=\"Authorization: Bearer $$WEBUI_TOKEN\" -O /dev/null http://127.0.0.1:8080/api/stats || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  botapi:
    image: aiogram/telegram-bot-api:latest
    container_name: tgdisk-botapi
    restart: unless-stopped
    env_file: .env

    command:
      - --http-port=8081
      - --dir=/var/lib/telegram-bot-api
      - --local

    volumes:
      # 关键：botapi local mode 的文件缓存/目录。tgdisk 以只读方式挂载同一个目录。
      - ./data/botapi:/var/lib/telegram-bot-api

    ports:
      # 可选：宿主机访问自建 Bot API。tgdisk 容器内部使用 http://botapi:8081。
      - "6553:8081"

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
